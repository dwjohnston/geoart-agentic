name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr *)'

      - name: Collect Claude session
        if: always()
        run: |
          if [ -d "$HOME/.claude" ]; then
            tar -czf claude-session.tar.gz -C "$HOME" .claude
          else
            echo "No .claude session directory found" > session-not-found.txt
            tar -czf claude-session.tar.gz session-not-found.txt
          fi

      - name: Upload session artifact
        if: always()
        id: upload-session
        uses: actions/upload-artifact@v4
        with:
          name: claude-session-${{ github.run_id }}
          path: claude-session.tar.gz
          retention-days: 30

      - name: Comment with artifact link
        if: always() && steps.upload-session.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "issue_comment" || "${{ github.event_name }}" == "issues" ]]; then
            NUMBER="${{ github.event.issue.number }}"
          elif [[ "${{ github.event_name }}" == "pull_request_review_comment" ]]; then
            NUMBER="${{ github.event.pull_request.number }}"
          elif [[ "${{ github.event_name }}" == "pull_request_review" ]]; then
            NUMBER="${{ github.event.pull_request.number }}"
          fi

          gh issue comment "$NUMBER" \
            --repo "${{ github.repository }}" \
            --body "**Claude session transcript:** [Download artifact](${{ steps.upload-session.outputs.artifact-url }})"
