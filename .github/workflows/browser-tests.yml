name: Browser Tests 

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4


      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install

      - name: Install playwright browsers
        run: bunx playwright install --with-deps


      - name: Generate
        run: bun generate           

      - name: Test Browser
        # https://github.com/oven-sh/bun/issues/31497
        run: npm run test:browser:headless --force